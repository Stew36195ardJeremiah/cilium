name: Feature Request
description: Suggest a new feature or enhancement for Cilium
labels: ["kind/feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature! Please fill out this form as completely as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting a feature request.
      options:
        - label: I have searched the [existing issues](https://github.com/cilium/cilium/issues) and this feature has not been requested before.
          required: true
        - label: I have read the [Cilium documentation](https://docs.cilium.io/).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the desired behavior or feature...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: Which area of Cilium does this feature request relate to?
      multiple: true
      options:
        - Networking
        - Network Policy
        - Load Balancing
        - Observability / Hubble
        - Security
        - Encryption
        - BGP
        - Service Mesh
        - Operator
        - CLI / Cilium CLI
        - Documentation
        - Testing
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or references about the feature request here.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to contribute this feature in a pull request.
          required: false
